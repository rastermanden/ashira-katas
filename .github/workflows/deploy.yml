name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

# Serialize every push to the gh-pages branch across BOTH this workflow and
# the PR-preview workflow. A merge fires both at once (push to main + PR
# closed), and without a shared group their concurrent pushes race — one is
# rejected as non-fast-forward and silently lost (e.g. a dropped preview
# cleanup). cancel-in-progress:false lets the in-flight push finish first.
concurrency:
  group: gh-pages-deploy
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          BASE_PATH: /ashira-katas

      - name: Add .nojekyll
        run: touch out/.nojekyll

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
          keep_files: true
