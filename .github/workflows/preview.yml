name: PR Preview

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - closed

concurrency: preview-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write

jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        if: github.event.action != 'closed'
        run: npm ci

      - name: Build
        if: github.event.action != 'closed'
        run: npm run build
        env:
          BASE_PATH: /ashira-katas/pr-preview/pr-${{ github.event.number }}

      - name: Add .nojekyll to build output
        if: github.event.action != 'closed'
        run: touch out/.nojekyll

      # Seed .nojekyll at the ROOT of gh-pages so Jekyll never runs.
      # Without this, GitHub Pages ignores the _next/ asset directory.
      - name: Seed .nojekyll at gh-pages root
        if: github.event.action != 'closed'
        run: mkdir -p /tmp/nojekyll-root && touch /tmp/nojekyll-root/.nojekyll

      - name: Deploy .nojekyll to gh-pages root
        if: github.event.action != 'closed'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: /tmp/nojekyll-root
          keep_files: true
          commit_message: 'ci: ensure .nojekyll at gh-pages root'

      - name: Deploy PR preview
        uses: rossjrw/pr-preview-action@v1
        with:
          source-dir: out
          preview-branch: gh-pages
          umbrella-dir: pr-preview
          action: auto
          token: ${{ secrets.GITHUB_TOKEN }}
